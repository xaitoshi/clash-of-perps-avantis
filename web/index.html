<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clash of Perps</title>

    <!-- Farcaster Mini App embed -->
    <meta property="og:title" content="Clash of Perps" />
    <meta property="og:description" content="Build, raid, trade. Clash of Clans meets DeFi." />
    <meta property="og:image" content="https://clashofperps.fun/godot/Work.png" />
    <meta property="fc:frame" content='{"version":"1","imageUrl":"https://clashofperps.fun/godot/Work.png","button":{"title":"Play Now","action":{"type":"launch_frame","url":"https://clashofperps.fun","name":"Clash of Perps","splashImageUrl":"https://clashofperps.fun/godot/Work.icon.png","splashBackgroundColor":"#0a0b1a"}}}' />

    <!-- Parallel preload of heavy Godot assets — starts downloading BEFORE JS executes -->
    <link rel="preload" href="/godot/Work.js" as="script" />
    <link rel="preload" href="/godot/Work.wasm" as="fetch" crossorigin />
    <link rel="preload" href="/godot/Work.side.wasm" as="fetch" crossorigin />
    <!-- Work.pck is too large for preload hint (browser warns if not used in 3s) -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).catch(() => {});
      }
      // Early Farcaster SDK init — must call ready() ASAP to dismiss splash
      // and signal to Warpcast that the app is alive
      try {
        if (window !== window.parent) {
          window.__fcEarly = import('https://esm.sh/@farcaster/miniapp-sdk@0.3.0').then(function(m) {
            m.sdk.actions.ready();
            window.__fcSdk = m.sdk;
            window.__fcUser = m.sdk.context && m.sdk.context.user;
            return m.sdk;
          }).catch(function(){});
        }
      } catch(e) {}
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
