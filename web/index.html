<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/icons/icon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Clash of Perps</title>

    <!-- Farcaster Mini App embed -->
    <meta property="og:title" content="Clash of Perps" />
    <meta property="og:description" content="Build, raid, trade. Clash of Clans meets DeFi." />
    <meta property="og:image" content="https://clashofperps.fun/hero.jpg" />
    <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://clashofperps.fun/hero.jpg","button":{"title":"Play Now","action":{"type":"launch_miniapp","url":"https://clashofperps.fun","name":"Clash of Perps","splashImageUrl":"https://clashofperps.fun/icons/icon.jpg","splashBackgroundColor":"#0a0b1a"}}}' />
    <meta name="fc:frame" content='{"version":"1","imageUrl":"https://clashofperps.fun/hero.jpg","button":{"title":"Play Now","action":{"type":"launch_frame","url":"https://clashofperps.fun","name":"Clash of Perps","splashImageUrl":"https://clashofperps.fun/icons/icon.jpg","splashBackgroundColor":"#0a0b1a"}}}' />

    <!-- Godot JS loaded dynamically by GodotCanvas with cache-bust -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).catch(function(){});
      }
    </script>
    <script>
      // Debug: log Farcaster SDK state to server (runs before React)
      function _clog(msg) {
        fetch('/api/client-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level: 'debug', message: msg, ua: navigator.userAgent }),
        }).catch(function(){});
      }
      var _inIframe = false;
      try { _inIframe = window !== window.parent; } catch(e) { _inIframe = true; }
      _clog('page-load: iframe=' + _inIframe + ' url=' + location.href);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
